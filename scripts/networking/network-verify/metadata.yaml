file: script.sh
name: osdctl-network-verifier
shortDescription: Downloads latest osdctl binary and runs network egress verification in pod mode.
description: |
  Downloads the latest osdctl binary from GitHub and runs network egress verification using Kubernetes jobs in pod mode.
  
  This script verifies that a ROSA/OSD cluster can reach all required external URLs necessary for full support.
  It uses osd-network-verifier's pod mode which runs verification as Kubernetes Jobs within the target cluster,
  providing more accurate results as it tests from within the actual cluster environment.
  
  The script automatically:
  - Downloads the latest osdctl binary from GitHub releases
  - Detects the AWS region from cluster infrastructure or metadata service
  - Runs network verification in pod mode with service log sending disabled
  - Uses the openshift-network-diagnostics namespace for verification pods
  
  Pod mode verification is more accurate than traditional cloud instance verification as it:
  - Tests from within the actual cluster environment
  - Works correctly with both public and private subnets
  - Doesn't require NAT gateway access like traditional probe instances
  
  This script requires cluster-level RBAC permissions to create and manage verification pods and jobs.

author: OpenShift SRE
allowedGroups:
  - SREP
  - CEE
  - MCSTierTwo
rbac:
  clusterRoleRules:
    # Permissions for pods - needed to create, monitor, and clean up verification pods
    - verbs:
        - "get"
        - "list"
        - "create"
        - "delete"
        - "watch"
      apiGroups:
        - ""
      resources:
        - "pods"
    # Permissions for namespaces - needed to access and create the verification namespace
    - verbs:
        - "get"
        - "list"
        - "create"
        - "delete"
        - "watch"
      apiGroups:
        - ""
      resources:
        - "namespaces"
    # Permissions for jobs - needed to create and manage Kubernetes jobs for verification
    - verbs:
        - "get"
        - "list"
        - "create"
        - "delete"
        - "watch"
      apiGroups:
        - "batch"
      resources:
        - "jobs"
    # Permission to read cluster infrastructure for region detection
    - verbs:
        - "get"
      apiGroups:
        - "config.openshift.io"
      resources:
        - "infrastructures"
    # Permission to read pod logs for debugging verification results
    - verbs:
        - "get"
      apiGroups:
        - ""
      resources:
        - "pods/log"
language: bash
customerDataAccess: false 