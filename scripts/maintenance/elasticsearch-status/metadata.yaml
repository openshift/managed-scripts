file: script.sh
description: Check status of elastic search on clusters
author: lfalconm
allowedGroups:
  - SREP
  - CEE
  - LPSRE
  - MCSTierTwo
rbac:
  roles:
    - namespace: "openshift-monitoring"
      rules:
        - verbs:
            - "get"
            - "list"
          apiGroups:
            - ""
          resources:
            - "pods"
            - "clusterlogging"
            - "elasticsearch"
            - "replicasets"
            - "deployment"
            - "resourcequota"
            - "persistentvolumeclaim"
        - verbs:
            - "create"
          apiGroups:
            - ""
          resources:
            - "pods/exec"
        - verbs:
            - "get"
            - "list"
          apiGroups:
            - "operators.coreos.com"
          resources:
            - "subscriptions"
language: bash
customerDataAccess: false
