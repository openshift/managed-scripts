apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: pr-check
spec:
  pipelineSpec:
    params:
      - name: SNAPSHOT
        description: The SNAPSHOT of the application under test
        type: string
    workspaces:
      - name: workspace
    tasks:
    - name: parse-snapshot
      taskSpec:
        params:
          - name: SNAPSHOT
            type: string
        results:
          - name: git-url
            description: Git repository URL from SNAPSHOT
          - name: git-revision
            description: Git revision from SNAPSHOT
        steps:
          - name: parse
            image: registry.access.redhat.com/ubi8/ubi:8.10-1778769589@sha256:1551c9a922dbb31c5688380fd955ef57f0f00b395bacb36856bc386eba82897b
            script: |
              #!/bin/bash
              set -ex

              # Install jq
              yum install -y jq >/dev/null 2>&1

              # Parse SNAPSHOT and write results (tr -d '\n' removes newlines)
              echo '$(params.SNAPSHOT)' | jq -r '.components[0].source.git.url' | tr -d '\n' > $(results.git-url.path)
              echo '$(params.SNAPSHOT)' | jq -r '.components[0].source.git.revision' | tr -d '\n' > $(results.git-revision.path)

              # Debug output
              echo "Git URL: $(cat $(results.git-url.path))"
              echo "Git revision: $(cat $(results.git-revision.path))"
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
    - name: clone-repository
      runAfter:
        - parse-snapshot
      taskRef:
        resolver: bundles
        params:
          - name: name
            value: git-clone
          - name: bundle
            value: quay.io/konflux-ci/tekton-catalog/task-git-clone:0.1@sha256:fedaacbf05ff7b2cdd36bff6cb1f103755cb5dc0b4adc0540136d3606ade18a5
          - name: kind
            value: task
      params:
        - name: url
          value: $(tasks.parse-snapshot.results.git-url)
        - name: revision
          value: $(tasks.parse-snapshot.results.git-revision)
      workspaces:
        - name: output
          workspace: workspace
    - name: run-validation
      runAfter:
        - clone-repository
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: validation
            image: registry.access.redhat.com/ubi8/ubi:8.10-1778769589@sha256:1551c9a922dbb31c5688380fd955ef57f0f00b395bacb36856bc386eba82897b
            workingDir: $(workspaces.source.path)/source
            script: |
              #!/bin/bash
              set -eo pipefail

              echo "Installing dependencies..."
              yum install -y https://dl.fedoraproject.org/pub/epel/epel-release-latest-8.noarch.rpm >/dev/null 2>&1
              yum install -y python3.11 python3.11-pip ShellCheck >/dev/null 2>&1

              echo "Installing Python packages..."
              python3.11 -m pip install -q check-jsonschema pyflakes

              echo "Running metadata validation..."
              python3.11 -m check_jsonschema --schemafile hack/metadata.schema.json $(find scripts -name 'metadata.yaml')

              echo "Running shellcheck..."
              find scripts -name '*.sh' -print0 | xargs -0 -n1 shellcheck -e SC2154

              echo "Running pyflakes..."
              find scripts -name '*.py' -print0 | xargs -0 -n1 pyflakes

              echo "All PR checks passed!"
      workspaces:
        - name: source
          workspace: workspace
  workspaces:
    - name: workspace
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
