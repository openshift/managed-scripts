apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: pr-check
spec:
  pipelineSpec:
    params:
      - name: SNAPSHOT
        description: The SNAPSHOT of the application under test
        type: string
    workspaces:
      - name: workspace
    tasks:
    - name: clone-repository
      taskRef:
        resolver: bundles
        params:
          - name: name
            value: git-clone
          - name: bundle
            value: quay.io/konflux-ci/tekton-catalog/task-git-clone:0.1@sha256:7db7ad9653dccc771407cb0294487cf4be9064fa782ffad7e983db1a8ba57e21
          - name: kind
            value: task
      params:
        - name: url
          value: https://github.com/openshift/managed-scripts
        - name: revision
          value: main
      workspaces:
        - name: output
          workspace: workspace
    - name: run-validation
      runAfter:
        - clone-repository
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: validation
            image: registry.access.redhat.com/ubi8/ubi:8.10-1774368078
            workingDir: $(workspaces.source.path)/source
            script: |
              #!/bin/bash
              set -eo pipefail

              echo "Installing dependencies..."
              yum install -y https://dl.fedoraproject.org/pub/epel/epel-release-latest-8.noarch.rpm >/dev/null 2>&1
              yum install -y python3.11 python3.11-pip ShellCheck >/dev/null 2>&1

              echo "Installing Python packages..."
              python3.11 -m pip install -q check-jsonschema pyflakes

              echo "Running metadata validation..."
              YAML_FILES=$(find scripts -name 'metadata.yaml')
              if [ -n "$YAML_FILES" ]; then
                python3.11 -m check_jsonschema --schemafile hack/metadata.schema.json $YAML_FILES
              else
                echo "No metadata.yaml files found!"
                exit 1
              fi

              echo "Running shellcheck..."
              find scripts -name '*.sh' -print0 | xargs -0 -n1 shellcheck -e SC2154

              echo "Running pyflakes..."
              find scripts -name '*.py' -print0 | xargs -0 -n1 pyflakes

              echo "All PR checks passed!"
      workspaces:
        - name: source
          workspace: workspace
  workspaces:
    - name: workspace
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
